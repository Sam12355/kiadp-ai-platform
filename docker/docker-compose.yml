version: '3.8'

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: khalifa-postgres
    environment:
      POSTGRES_USER: khalifa
      POSTGRES_PASSWORD: khalifa_password_2026
      POSTGRES_DB: khalifa_db
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U khalifa -d khalifa_db']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend API ──
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: khalifa-backend
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://khalifa:khalifa_secret@postgres:5432/khalifa_knowledge
      NODE_ENV: development
      PORT: 3001
    env_file:
      - ./packages/backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

  # ── Worker (Ingestion) ──
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: khalifa-worker
    command: ['node', 'dist/worker.js']
    environment:
      DATABASE_URL: postgresql://khalifa:khalifa_secret@postgres:5432/khalifa_knowledge
      NODE_ENV: development
    env_file:
      - ./packages/backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

  # ── Frontend ──
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: khalifa-frontend
    ports:
      - '5173:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
